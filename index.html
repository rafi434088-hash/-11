<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Windows 11 System Service</title>
    <style>
        :root { --win-accent: #0078d4; --glass: rgba(255, 255, 255, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #fff; }

        /* --- מסך הורדה/עדכון (PRANK START) --- */
        #landing { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; z-index: 500000; }
        .ms-logo { width: 120px; margin-bottom: 25px; }
        .card { border: 1px solid #ddd; padding: 40px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 500px; text-align: center; }
        .btn-main { background: var(--win-accent); color: #fff; border: none; padding: 14px 35px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 20px; }

        #update-screen { position: fixed; inset: 0; background: #0078d4; z-index: 400000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .spinner { width: 55px; height: 55px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .setup-box { background: rgba(0,0,0,0.2); padding: 35px; border-radius: 12px; width: 400px; backdrop-filter: blur(20px); }
        .setup-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; text-align: center; outline: none; }

        /* --- מסכי מערכת --- */
        #lock-screen { position: fixed; inset: 0; z-index: 300000; background: url('https://w0.peakpx.com/wallpaper/32/384/wallpaper-forest-waterfall-river-stones-nature.jpg') center/cover; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); display: none; }
        #lock-screen.up { transform: translateY(-100%); }
        #login-screen { position: fixed; inset: 0; z-index: 250000; background: url('https://w0.peakpx.com/wallpaper/32/384/wallpaper-forest-waterfall-river-stones-nature.jpg') center/cover; display: none; align-items: center; justify-content: center; }
        #login-blur { position: absolute; inset: 0; backdrop-filter: blur(70px) brightness(0.6); }
        .login-ui { position: relative; z-index: 10; text-align: center; color: white; width: 320px; }
        .pfp { width: 150px; height: 150px; border-radius: 50%; background: #ccc url('https://img.icons8.com/fluency/144/user-male-circle.png') center/cover; margin: 0 auto 20px; border: 2px solid white; }
        .login-input { width: 100%; padding: 12px; border: none; background: rgba(0,0,0,0.3); color: white; border-bottom: 2px solid var(--win-accent); outline: none; text-align: center; font-size: 18px; }

        /* --- שולחן עבודה --- */
        #desktop { width: 100%; height: 100%; background: url('https://w0.peakpx.com/wallpaper/32/384/wallpaper-forest-waterfall-river-stones-nature.jpg') center/cover; position: relative; display: none; }

        /* --- שורת המשימות המלאה --- */
        #taskbar { position: fixed; bottom: 0; left: 0; right: 0; height: 48px; background: rgba(243, 243, 243, 0.85); backdrop-filter: blur(25px); display: none; align-items: center; z-index: 100000; border-top: 1px solid #ddd; padding: 0 15px; }
        .tb-left { width: 200px; display: flex; align-items: center; gap: 15px; }
        .tb-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .tb-right { width: 200px; display: flex; justify-content: flex-end; align-items: center; gap: 12px; color: #333; font-size: 12px; text-align: right; }
        .tb-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border-radius: 4px; }
        .tb-icon:hover { background: rgba(0,0,0,0.05); }
        .tb-icon img { width: 24px; }
        .system-icons { display: flex; gap: 8px; font-size: 16px; margin-left: 10px; opacity: 0.7; }
